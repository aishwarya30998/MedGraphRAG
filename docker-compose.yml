version: '3.8'

services:
  neo4j:
    image: neo4j:5.18-community
    container_name: medgraph-neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/medgraph123
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "-q", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: medgraph-app
    ports:
      - "8501:8501"
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      # Override localhost with Docker service/host names
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=medgraph123
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3.2:3b
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:

# NOTE: Ollama runs on your Mac host (not in Docker).
# Make sure ollama is running and llama3.2:3b is pulled before starting.
# After FIRST docker-compose up --build, run data init once:
#   docker exec medgraph-app python data/generate_synthetic.py
#   docker exec medgraph-app python graph/build_graph.py
#   docker exec medgraph-app python graph/enrich_graph.py
